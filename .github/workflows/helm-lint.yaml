name: Helm Lint

on:
  push:
    branches:
      - main
  pull_request: {}

jobs:
  lint:
    name: Lint Helm chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint .
